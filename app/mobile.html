<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GM AI" />
    <meta name="mobile-web-app-capable" content="yes">

    <title>Gentle Monster AI (Mobile)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* Mobile App Optimizations */
        html {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-user-select: none;
            user-select: none;
        }

        input,
        textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        @font-face {
            font-family: 'GentleMonsterSerif';
            src: url('/GentleMonsterSerif-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'GentleMonsterSerif', sans-serif;
            background-color: #000000;
            color: #e4e4e7;
        }

        /* MOBILE DRAWER CSS - Aggressive Overrides */

        /* 1. Main Container: Keep flex but hide sidebar by default */
        #root>div {
            position: relative;
            height: 100vh;
            overflow: hidden;
            flex-direction: column !important;
            /* Force stack just in case */
        }

        /* 2. Sidebar (Hidden by default, becomes Modal) */
        #root>div>div:first-child {
            display: none;
            /* JS will toggle this to 'flex' */
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.98);
            width: 100% !important;
            height: 100% !important;
            max-height: none !important;
            flex-direction: column;
            padding: 60px 20px 100px 20px;
            overflow-y: auto;
            /* Scrollable content */
            border: none !important;
        }

        /* 3. Content (Full Screen Image) */
        #root>div>div:last-child {
            width: 100% !important;
            height: 100% !important;
            padding: 0 !important;
        }

        /* Typography Reset for Mobile */
        html,
        body {
            font-size: 14px;
        }

        input,
        button {
            max-width: 100%;
        }

        /* Floating Action Button Style */
        #mobile-menu-btn {
            display: flex;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            color: black;
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-family: 'GentleMonsterSerif', serif;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Welcome Placeholder */
        #mobile-welcome {
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 0;
            pointer-events: none;
            width: 100%;
            padding: 0 20px;
            opacity: 0.6;
        }

        #mobile-welcome h1 {
            font-family: 'GentleMonsterSerif', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        #mobile-welcome p {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 2px;
        }
    </style>

<body>
    <!-- Password Protection (Optional for mobile? User wanted it kept) -->
    <div id="auth-overlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;">
        <div
            style="font-family: 'GentleMonsterSerif', serif; font-size: 2rem; margin-bottom: 2rem; letter-spacing: 2px;">
            GENTLE MONSTER</div>
        <div
            style="font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px; color: #666; margin-bottom: 3rem; text-transform: uppercase;">
            Space Team Access</div>

        <div
            style="width: 100%; max-width: 300px; position: relative; display: flex; align-items: center; border-bottom: 1px solid #333;">
            <input type="password" id="pass-input" placeholder="ENTER PASSWORD"
                style="flex: 1; background: transparent; border: none; color: white; padding: 10px 0; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; text-align: center; border-radius: 0; -webkit-appearance: none; appearance: none;">
            <button id="auth-btn"
                style="background: transparent; border: none; color: white; padding: 10px; cursor: pointer; font-size: 1.2rem;">→</button>
        </div>
        <div id="error-msg"
            style="color: #ff3333; font-size: 0.7rem; margin-top: 10px; text-align: center; opacity: 0; transition: opacity 0.3s;">
            INCORRECT PASSWORD</div>
    </div>

    <div id="mobile-welcome">
        <h1>GENTLE MONSTER</h1>
        <p>TAP MENU TO CONFIGURE</p>
    </div>

    <script>
        (function () {
            // --- AUTH LOGIC ---
            const overlay = document.getElementById('auth-overlay');
            const input = document.getElementById('pass-input');
            const btn = document.getElementById('auth-btn');
            const errorMsg = document.getElementById('error-msg');
            const CORRECT_PASS = 'spaceteam';

            if (sessionStorage.getItem('gm_auth') === 'true') {
                overlay.style.display = 'none';
            }

            function checkPass() {
                if (input.value === CORRECT_PASS) {
                    sessionStorage.setItem('gm_auth', 'true');
                    overlay.style.opacity = '0';
                    overlay.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                    input.blur();
                } else {
                    errorMsg.style.opacity = '1';
                    input.value = '';
                    setTimeout(() => { errorMsg.style.opacity = '0'; }, 2000);
                }
            }

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkPass();
            });
            btn.addEventListener('click', checkPass);


            // --- DRAWER LOGIC ---
            const menuBtn = document.createElement('button');
            menuBtn.id = 'mobile-menu-btn';
            menuBtn.innerHTML = '<span>MENU</span>';
            document.body.appendChild(menuBtn);

            let isOpen = false;
            let sidebar = null;

            function toggleMenu() {
                if (!sidebar) return;
                isOpen = !isOpen;
                if (isOpen) {
                    sidebar.style.display = 'flex';
                    sidebar.style.animation = 'fadeIn 0.3s';
                    menuBtn.innerHTML = '<span>CLOSE</span>';
                    menuBtn.style.background = '#333';
                    menuBtn.style.color = 'white';
                } else {
                    sidebar.style.display = 'none';
                    menuBtn.innerHTML = '<span>MENU</span>';
                    menuBtn.style.background = 'white';
                    menuBtn.style.color = 'black';
                }
            }

            menuBtn.addEventListener('click', toggleMenu);

            const observer = new MutationObserver((mutations, obs) => {
                const rootDiv = document.querySelector('#root > div');
                if (rootDiv && rootDiv.children.length > 0) {
                    // Heuristic for Sidebar
                    const children = Array.from(rootDiv.children);
                    const found = children.find(child => {
                        const text = child.innerText || "";
                        return (text.includes('PROMPT') || text.includes('VISION') || text.includes('CREATE'));
                    });

                    if (found) {
                        sidebar = found;
                        sidebar.style.display = 'none'; // Init hidden
                        obs.disconnect();
                    } else {
                        if (children.length >= 2) {
                            if (!sidebar) {
                                sidebar = children[0];
                                sidebar.style.display = 'none'; // Init hidden
                            }
                        }
                    }
                }
            });

            observer.observe(document.getElementById('root'), {
                childList: true,
                subtree: true
            });

        })();
    </script>
    <div id="root"></div>
</body>

</html>
